<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기출문제 열람 신청</title>
  <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
  <script src="[https://unpkg.com/react@18/umd/react.production.min.js](https://unpkg.com/react@18/umd/react.production.min.js)" crossorigin></script>
  <script src="[https://unpkg.com/react-dom@18/umd/react-dom.production.min.js](https://unpkg.com/react-dom@18/umd/react-dom.production.min.js)" crossorigin></script>
  <script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // 배포된 구글 앱스 스크립트 주소
    const GAS_WEB_APP_URL = "[https://script.google.com/macros/s/AKfycbyKKhUbAcnPNLhSK3y754LSCxO10uheHJkeYKctubBpCjKHDXaOIwDlCORlDCmxxeT_vQ/exec](https://script.google.com/macros/s/AKfycbyKKhUbAcnPNLhSK3y754LSCxO10uheHJkeYKctubBpCjKHDXaOIwDlCORlDCmxxeT_vQ/exec)"; 
    
    const MAX_LIMIT = 5;
    const DATES = ['4월 20일', '4월 21일', '4월 22일'];
    const TIMES = ['08:50~09:00','09:50~10:00','10:50~11:00','11:50~12:00','12:50~13:00','13:00~13:10','13:10~13:20','13:20~13:30','13:30~13:40','14:30~14:40','15:30~15:40'];

    function App() {
      const [formData, setFormData] = useState({ department: '', grade: '', studentClass: '', name: '', date: '', time: '' });
      const [bookingsCount, setBookingsCount] = useState({});
      const [status, setStatus] = useState('idle');

      const fetchBookings = () => {
        // 주소 뒤에 시간을 붙여 강제로 최신 데이터를 불러옴 (캐시 방지)
        const cacheBuster = GAS_WEB_APP_URL + "?t=" + new Date().getTime();
        fetch(cacheBuster)
          .then(res => res.json())
          .then(data => { if (data.success) setBookingsCount(data.counts); })
          .catch(err => console.error(err));
      };

      useEffect(() => {
        fetchBookings();
        const interval = setInterval(fetchBookings, 3000); // 3초마다 갱신
        return () => clearInterval(interval);
      }, []);

      const handleChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
        if (name === 'date') setFormData(prev => ({ ...prev, time: '' }));
        fetchBookings(); // 항목 변경 시 즉시 갱신
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setStatus('submitting');
        try {
          const res = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify(formData),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          });
          const result = await res.json();
          if (result.success) setStatus('success');
          else { alert(result.message); fetchBookings(); setStatus('idle'); }
        } catch (error) { setStatus('error'); alert('신청 중 오류가 발생했습니다.'); }
      };

      if (status === 'success') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 text-center">
            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full border border-gray-100">
              <div className="text-green-500 text-6xl mb-4">✓</div>
              <h2 className="text-2xl font-bold mb-2">신청이 완료되었습니다!</h2>
              <p className="text-gray-600 mb-6 font-medium">신청 시간에 반드시<br/><span className="text-blue-600 font-bold">본교무실</span>로 찾아와주세요.</p>
              <button onClick={() => window.location.reload()} className="w-full py-3 bg-blue-600 hover:bg-blue-700 transition-colors text-white rounded-lg font-bold">
                처음으로
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="p-4 max-w-2xl mx-auto py-10">
          <div className="text-center mb-8">
            <h1 className="text-3xl font-extrabold text-gray-900">기출문제 열람 신청</h1>
            <p className="text-blue-600 font-bold mt-2 text-sm">모든 시간대는 선착순 5명 제한 / 실시간 반영 중</p>
          </div>
          <div className="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
            <form onSubmit={handleSubmit} className="space-y-5">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                <select name="department" required value={formData.department} onChange={handleChange} className="p-3 border border-gray-300 rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500">
                  <option value="" disabled>학과 선택</option>
                  {['건축디자인과', '제품디자인과', '패션디자인과', '시각디자인과', '도예디자인과'].map(d => <option key={d} value={d}>{d}</option>)}
                </select>
                <select name="grade" required value={formData.grade} onChange={handleChange} className="p-3 border border-gray-300 rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500">
                  <option value="" disabled>학년 선택</option>
                  {['1학년', '2학년', '3학년'].map(g => <option key={g} value={g}>{g}</option>)}
                </select>
                <select name="studentClass" required value={formData.studentClass} onChange={handleChange} className="p-3 border border-gray-300 rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500">
                  <option value="" disabled>반 선택</option>
                  {['1반', '2반'].map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <input type="text" name="name" required placeholder="이름" value={formData.name} onChange={handleChange} className="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500" />
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4 border-t border-gray-200">
                <select name="date" required value={formData.date} onChange={handleChange} className="p-3 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-blue-500">
                  <option value="" disabled>날짜 선택</option>{DATES.map(d => <option key={d} value={d}>{d}</option>)}
                </select>
                <select name="time" required value={formData.time} onChange={handleChange} className="p-3 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-blue-500">
                  <option value="" disabled>시간 선택</option>
                  {TIMES.map(t => {
                    const count = bookingsCount[`${formData.date}|${t}`] || 0;
                    const remain = MAX_LIMIT - count;
                    return (
                      <option key={t} value={t} disabled={formData.date && remain <= 0}>
                        {t} {formData.date ? (remain <= 0 ? `(마감)` : `(잔여: ${remain}명)`) : ''}
                      </option>
                    );
                  })}
                </select>
              </div>
              <button type="submit" disabled={status === 'submitting' || !formData.date || !formData.time || (bookingsCount[`${formData.date}|${formData.time}`] || 0) >= MAX_LIMIT} className="w-full py-4 bg-blue-600 hover:bg-blue-700 transition-colors text-white rounded-lg font-bold disabled:bg-gray-300 disabled:cursor-not-allowed">
                {status === 'submitting' ? '처리 중...' : '열람 신청하기'}
              </button>
            </form>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
