<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기출문제 열람 신청</title>
  
  <!-- Tailwind CSS 로드 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 로드 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel 컴파일러 로드 (브라우저에서 React 코드 바로 실행) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
  <!-- React 앱이 표시될 빈 영역 -->
  <div id="root"></div>

  <!-- React 앱 코드 -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 아이콘 컴포넌트 세팅 (단일 파일 배포를 위해 SVG로 직접 구현) ---
    const BookOpen = () => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-8 h-8 text-blue-600"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>);
    const UserIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 mr-2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>);
    const UsersIcon = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>);
    const CalendarIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 mr-1 text-gray-500"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect><line x1="16" x2="16" y1="2" y2="6"></line><line x1="8" x2="8" y1="2" y2="6"></line><line x1="3" x2="21" y1="10" y2="10"></line></svg>);
    const ClockIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 mr-1 text-gray-500"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>);
    const CheckCircleIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-green-400 mr-3 mt-0.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>);
    const AlertCircleIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-red-400 mr-3 mt-0.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="8" y2="12"></line><line x1="12" x2="12.01" y1="16" y2="16"></line></svg>);

    // --- 환경 설정 및 데이터 ---
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyKKhUbAcnPNLhSK3y754LSCxO10uheHJkeYKctubBpCjKHDXaOIwDlCORlDCmxxeT_vQ/exec"; 
    
    const DEPARTMENTS = ['건축디자인과', '제품디자인과', '패션디자인과', '시각디자인과', '도예디자인과'];
    const GRADES = ['1학년', '2학년', '3학년'];
    const CLASSES = ['1반', '2반'];
    const DATES = ['4월 20일', '4월 21일', '4월 22일'];
    const TIMES = [
      '08:50~09:00',
      '09:50~10:00',
      '10:50~11:00',
      '11:50~12:00',
      '12:50~13:40',
      '14:30~14:40',
      '15:30~15:40'
    ];

    const getMaxLimit = (time) => {
      return time === '12:50~13:40' ? 30 : 10;
    };

    // --- 메인 앱 컴포넌트 ---
    function App() {
      const [formData, setFormData] = useState({
        department: '',
        grade: '',
        studentClass: '',
        name: '',
        date: '',
        time: ''
      });

      const [bookingsCount, setBookingsCount] = useState({});
      const [status, setStatus] = useState('idle'); 
      const [message, setMessage] = useState('');

      const handleChange = (e) => {
        const { name, value } = e.target;
        setFormData((prev) => ({ ...prev, [name]: value }));
      };

      const currentSlotKey = `${formData.date}|${formData.time}`;
      const currentCount = bookingsCount[currentSlotKey] || 0;
      const currentLimit = getMaxLimit(formData.time);
      const isFull = formData.time ? currentCount >= currentLimit : false;

      useEffect(() => {
        if (GAS_WEB_APP_URL) {
          fetch(GAS_WEB_APP_URL)
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                setBookingsCount(data.counts);
              }
            })
            .catch(err => console.error("데이터 오류:", err));
        }
      }, []);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setStatus('submitting');
        setMessage('');

        if (isFull) {
          setStatus('error');
          setMessage('선택하신 시간대는 이미 마감되었습니다. 다른 시간대를 선택해주세요.');
          return;
        }

        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify(formData),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          });
          const result = await response.json();
          
          if (result.success) {
            setStatus('success');
            setMessage('신청이 성공적으로 완료되었습니다.');
            setBookingsCount(prev => ({
              ...prev,
              [currentSlotKey]: (prev[currentSlotKey] || 0) + 1
            }));
          } else {
            setStatus('error');
            setMessage(result.message || '신청 중 오류가 발생했습니다.');
          }
        } catch (error) {
          setStatus('error');
          setMessage('서버와의 통신에 실패했습니다.');
        }
      };

      const resetForm = () => {
        setFormData({ department: '', grade: '', studentClass: '', name: '', date: '', time: '' });
        setStatus('idle');
        setMessage('');
      };

      return (
        <div className="py-12 px-4 sm:px-6 lg:px-8">
          <div className="max-w-2xl mx-auto space-y-8">
            
            {/* 헤더 */}
            <div className="text-center">
              <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 mb-4">
                <BookOpen />
              </div>
              <h2 className="text-3xl font-extrabold text-gray-900">기출문제 열람 신청</h2>
              <div className="mt-3 text-sm text-gray-600 flex flex-col gap-1">
                <p>원하시는 날짜와 시간대를 선택하여 신청해 주세요.</p>
                <p>시간대별 선착순 10명 제한이 있습니다. <span className="font-medium text-blue-600">(점심시간은 선착순 30명 제한이 있습니다.)</span></p>
              </div>
            </div>

            {/* 폼 카드 */}
            <div className="bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-100">
              <div className="bg-blue-600 px-6 py-4 flex items-center">
                <UserIcon />
                <h3 className="text-lg font-medium text-white">
                  신청자 정보 입력
                </h3>
              </div>
              
              <form onSubmit={handleSubmit} className="p-6 space-y-6">
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">학과</label>
                    <select name="department" required value={formData.department} onChange={handleChange} className="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                      <option value="" disabled>학과를 선택하세요</option>
                      {DEPARTMENTS.map(dept => <option key={dept} value={dept}>{dept}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">학년</label>
                    <select name="grade" required value={formData.grade} onChange={handleChange} className="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                      <option value="" disabled>학년을 선택하세요</option>
                      {GRADES.map(grade => <option key={grade} value={grade}>{grade}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">반</label>
                    <select name="studentClass" required value={formData.studentClass} onChange={handleChange} className="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                      <option value="" disabled>반을 선택하세요</option>
                      {CLASSES.map(cls => <option key={cls} value={cls}>{cls}</option>)}
                    </select>
                  </div>
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">이름</label>
                  <input type="text" name="name" required placeholder="홍길동" value={formData.name} onChange={handleChange} className="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"/>
                </div>

                <hr className="border-gray-200" />

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div>
                    <label className="flex items-center text-sm font-medium text-gray-700 mb-2">
                      <CalendarIcon /> 열람 날짜
                    </label>
                    <select name="date" required value={formData.date} onChange={handleChange} className="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                      <option value="" disabled>날짜를 선택하세요</option>
                      {DATES.map(date => <option key={date} value={date}>{date}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="flex items-center text-sm font-medium text-gray-700 mb-2">
                      <ClockIcon /> 열람 시간대
                    </label>
                    <select name="time" required value={formData.time} onChange={handleChange} className="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                      <option value="" disabled>시간대를 선택하세요</option>
                      {TIMES.map(time => <option key={time} value={time}>{time}</option>)}
                    </select>
                  </div>
                </div>

                {formData.date && formData.time && (
                  <div className={`p-4 rounded-lg flex items-center justify-between border ${isFull ? 'bg-red-50 border-red-200' : 'bg-blue-50 border-blue-100'}`}>
                    <div className="flex items-center">
                      <UsersIcon className={`w-5 h-5 mr-2 ${isFull ? 'text-red-500' : 'text-blue-600'}`} />
                      <span className={`font-medium ${isFull ? 'text-red-700' : 'text-blue-800'}`}>
                        현재 신청 인원: <span className="text-lg">{currentCount}</span> / {currentLimit}명
                      </span>
                    </div>
                    {isFull && <span className="text-red-600 font-bold text-sm bg-red-100 px-2 py-1 rounded">마감됨</span>}
                  </div>
                )}

                {status === 'success' && (
                  <div className="rounded-lg bg-green-50 p-4 border border-green-200 flex items-start">
                    <CheckCircleIcon />
                    <p className="text-sm text-green-800 font-medium">{message}</p>
                  </div>
                )}
                
                {status === 'error' && (
                  <div className="rounded-lg bg-red-50 p-4 border border-red-200 flex items-start">
                    <AlertCircleIcon />
                    <p className="text-sm text-red-800 font-medium">{message}</p>
                  </div>
                )}

                <div className="pt-4">
                  {status === 'success' ? (
                    <button type="button" onClick={resetForm} className="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-blue-600 bg-blue-50 hover:bg-blue-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                      새로운 신청하기
                    </button>
                  ) : (
                    <button type="submit" disabled={status === 'submitting' || isFull || !formData.date || !formData.time} className={`w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white focus:outline-none focus:ring-2 focus:ring-blue-500 ${(status === 'submitting' || isFull || !formData.date || !formData.time) ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}>
                      {status === 'submitting' ? '신청 처리 중...' : isFull ? '마감되었습니다' : '열람 신청하기'}
                    </button>
                  )}
                </div>
              </form>
            </div>
          </div>
        </div>
      );
    }

    // React 렌더링
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
